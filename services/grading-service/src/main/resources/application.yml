server:
  port: 9400

spring:
  application:
    name: grading-service
  config:
    import:
      - 'optional:nacos:common.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true'
      - 'optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true'
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.242.10:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.242.10:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://192.168.242.10:3306/grading_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:192.168.242.10}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB_GRADING:5}
      timeout: 2s
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.242.10}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 20

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

snowflake:
  worker-id: 4
  datacenter-id: 1

smart-exam:
  mq:
    exam-submitted:
      max-retries: 3
      retry-ttl-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
